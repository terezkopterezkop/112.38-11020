name: Internal Proxy Slot

on:
  workflow_call:
    inputs:
      runner_id:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-22.04

    concurrency:
      group: proxy-slot-gh2-${{ inputs.runner_id }}
      cancel-in-progress: true

    env:
      RUNNER_ID: ${{ inputs.runner_id }}
      VPS_IP: ${{ secrets.VPS_IP }}

    steps:
      - run: sudo apt update && sudo apt install -y squid autossh curl

      - run: |
          sudo tee /etc/squid/squid.conf >/dev/null <<'EOF'
          http_port 3128
          acl all src 0.0.0.0/0
          http_access allow all
          EOF
          sudo systemctl restart squid

      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/tunnel_key
          chmod 600 ~/.ssh/tunnel_key

          cat > ~/.ssh/config <<EOF
          Host vps2
            HostName ${{ secrets.VPS_IP }}
            User root
            IdentityFile ~/.ssh/tunnel_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - run: |
          REMOTE_PORT=$((11000 + RUNNER_ID))

          autossh -M 0 -N -f \
            -o ExitOnForwardFailure=yes \
            -R 0.0.0.0:${REMOTE_PORT}:localhost:3128 \
            vps2

      - run: sleep 840
